{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Programación AAMO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10);
        }
        .login-header {
            background-color: #212529;
            border-radius: 16px 16px 0 0;
            padding: 32px 24px 24px;
            text-align: center;
        }
        .login-header img {
            max-width: 160px;
            border-radius: 8px;
            margin-bottom: 14px;
        }
        .login-header h5 {
            color: #fff;
            font-weight: 700;
            margin: 0;
        }
        .login-body {
            padding: 32px 28px;
            background: #fff;
            border-radius: 0 0 16px 16px;
        }
        .btn-login {
            background-color: #212529;
            color: #fff;
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        .btn-login:hover {
            background-color: #343a40;
            color: #fff;
        }
        .input-group-text {
            background: #f8f9fa;
        }
        .footer-text {
            text-align: center;
            color: #adb5bd;
            font-size: 0.8rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <img src="{% static 'img/Milton-Ochoa.png' %}" alt="Logo Milton Ochoa">
            <h5>Programación AAMO</h5>
        </div>
        <div class="login-body">
            <h6 class="text-muted mb-4 text-center">Ingresa tus credenciales para continuar</h6>

            {% if error %}
            <div class="alert alert-danger py-2 text-center" style="font-size: 0.9rem;">
                <i class="fas fa-exclamation-circle me-1"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold small">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" name="username" class="form-control" 
                               placeholder="Nombre de usuario" autofocus autocomplete="username" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" name="password" id="passwordInput" class="form-control" 
                               placeholder="Contraseña" autocomplete="current-password" required>
                        <button class="btn btn-outline-secondary" type="button" 
                                onclick="togglePass()" title="Mostrar/ocultar">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-login w-100 py-2">
                    <i class="fas fa-sign-in-alt me-2"></i> Ingresar
                </button>
            </form>
            <p class="footer-text">© 2026 Versión Web</p>
        </div>
    </div>

    <script>
        function togglePass() {
            const input = document.getElementById('passwordInput');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
