<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema AAMO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar-brand {
            font-weight: bold;
            letter-spacing: 1px;
        }

        .content-wrapper {
            flex: 1;
            padding: 20px;
        }

        .footer {
            background-color: #343a40;
            color: #adb5bd;
            padding: 15px 0;
            text-align: center;
            margin-top: auto;
        }

        /* Estilos globales para tarjetas */
        .card {
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        .card-header {
            font-weight: 600;
            background-color: #fff;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">🚀 AAMO System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-cogs"></i> Gestión de Datos
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="{% url 'gestion_libros' %}"><i
                                        class="fas fa-book text-primary"></i> Libros</a></li>
                            <li><a class="dropdown-item" href="{% url 'gestion_profesores' %}"><i
                                        class="fas fa-chalkboard-teacher text-warning"></i> Profesores</a></li>
                            <li><a class="dropdown-item" href="{% url 'gestion_colegios' %}"><i
                                        class="fas fa-school text-success"></i> Colegios</a></li>
                        </ul>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'dashboard' %}">
                            <i class="fas fa-calendar-alt"></i> Cronograma
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container content-wrapper">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="footer">
        <div class="container">
            <small>&copy; 2026 Sistema AAMO - Versión Web</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
