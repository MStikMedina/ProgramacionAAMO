<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema AAMO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden; /* Evita doble scroll */
        }

        /* Estilos del Menú Lateral */
        .sidebar {
            width: 260px;
            background-color: #212529;
            color: white;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        .sidebar-brand {
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            background-color: #1a1e21;
            border-bottom: 1px solid #343a40;
        }

        .sidebar-menu {
            flex-grow: 1;
            padding-top: 15px;
            overflow-y: auto;
        }

        .sidebar-menu a {
            color: #adb5bd;
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            font-size: 1.05rem;
            border-left: 4px solid transparent;
            transition: all 0.2s;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            color: #fff;
            background-color: #343a40;
            border-left-color: #0d6efd; /* Azul de Bootstrap */
        }

        .sidebar-menu i {
            width: 25px;
            text-align: center;
            margin-right: 10px;
        }

        /* Estilos del Contenido Principal */
        .main-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background-color: #f4f6f9;
            overflow-y: auto;
        }

        .top-header {
            background-color: #fff;
            padding: 15px 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-area {
            padding: 25px;
            flex-grow: 1;
        }

        /* Tarjetas (se mantiene tu estilo original) */
        .card {
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        .card-header {
            font-weight: 600;
            background-color: #fff;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

    <nav class="sidebar">
        <div class="sidebar-brand">
            🚀 AAMO System
        </div>
        <div class="sidebar-menu">
            <a href="{% url 'home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                <i class="fas fa-home"></i> Inicio
            </a>
            
            <div class="px-3 py-2 mt-3 mb-1 text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">Gestión de Datos</div>
            <a href="{% url 'gestion_colegios' %}" class="{% if request.resolver_match.url_name == 'gestion_colegios' %}active{% endif %}">
                <i class="fas fa-school text-success"></i> Colegios
            </a>
            <a href="{% url 'gestion_profesores' %}" class="{% if request.resolver_match.url_name == 'gestion_profesores' %}active{% endif %}">
                <i class="fas fa-chalkboard-teacher text-warning"></i> Profesores
            </a>
            <a href="{% url 'gestion_libros' %}" class="{% if request.resolver_match.url_name == 'gestion_libros' %}active{% endif %}">
                <i class="fas fa-book text-primary"></i> Libros
            </a>

            <div class="px-3 py-2 mt-3 mb-1 text-uppercase text-muted" style="font-size: 0.75rem; letter-spacing: 1px;">Operación</div>
            <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
                <i class="fas fa-calendar-alt text-info"></i> Cronograma
            </a>
        </div>
        <div class="p-3 text-center text-muted" style="font-size: 0.8rem; background-color: #1a1e21;">
            &copy; 2026 Versión Web
        </div>
    </nav>

    <div class="main-wrapper">
        <header class="top-header">
            <h5 class="mb-0 text-secondary fw-bold">{% block header_title %}Dashboard{% endblock %}</h5>
            <div>
                <a href="/admin" class="btn btn-outline-danger btn-sm" title="Ir al Panel de Administración">
                    <i class="fas fa-user-shield"></i> Admin
                </a>
            </div>
        </header>
        
        <div class="content-area">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
