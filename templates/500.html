{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error interno — Programación AAMO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .error-card {
            width: 100%;
            max-width: 520px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10);
            text-align: center;
            overflow: hidden;
        }
        .error-header {
            background-color: #212529;
            padding: 32px 24px 24px;
        }
        .error-header img {
            max-width: 140px;
            border-radius: 8px;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 900;
            color: #dc3545;
            line-height: 1;
            margin: 0;
        }
        .error-body {
            background: #fff;
            padding: 36px 32px;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-header">
            <img src="{% static 'img/Milton-Ochoa.png' %}" alt="Logo Milton Ochoa">
        </div>
        <div class="error-body">
            <p class="error-code">500</p>
            <h4 class="fw-bold text-dark mt-3">Error interno del servidor</h4>
            <p class="text-muted mt-2">
                Algo salió mal de nuestro lado.<br>
                El problema ha sido registrado. Por favor intenta de nuevo en unos minutos.
            </p>
            <hr class="my-4">
            <a href="/" class="btn btn-danger px-4">
                <i class="fas fa-home me-2"></i> Ir al inicio
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary px-4 ms-2">
                <i class="fas fa-arrow-left me-2"></i> Volver
            </a>
            <p class="text-muted mt-4 mb-0" style="font-size: 0.8rem;">© 2026 Programación AAMO</p>
        </div>
    </div>
</body>
</html>
